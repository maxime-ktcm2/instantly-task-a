  for (let i = 0; i < labels.length; i++) {
    const status = checklist[i] ? checklist[i][0] : 'na';
    const detail = checklist[i] ? checklist[i][1] : '';
    const icon = status === 'pass' ? '✓' : status === 'partial' ? '~' : '·';
    html += '<div class="checklist-item">';
    html += '<div class="status-icon status-' + status + '">' + icon + '</div>';
    html += '<div class="checklist-label">' + escapeHtml(labels[i]) + '</div>';
    html += '<div class="checklist-detail">' + escapeHtml(detail) + '</div>';
    html += '</div>';
  }
  html += '</div>';

  // 6-card grid
  html += '<div class="section-title">Per-step evidence</div>';
  html += '<div class="card-grid">';

  // Card 1: Apollo Org
  html += '<div class="card"><div class="card-title">Apollo Organization <span class="card-title-tag">firmographics</span></div>';
  if (org.name || org.industry) {
    html += '<div class="card-row"><div class="card-row-label">Name</div><div class="card-row-value">' + escapeHtml(org.name || 'n/a') + '</div></div>';
    html += '<div class="card-row"><div class="card-row-label">Industry</div><div class="card-row-value">' + escapeHtml(org.industry || 'n/a') + '</div></div>';
    html += '<div class="card-row"><div class="card-row-label">Size</div><div class="card-row-value">' + escapeHtml(org.estimated_num_employees || 'n/a') + ' employees</div></div>';
    html += '<div class="card-row"><div class="card-row-label">Country</div><div class="card-row-value">' + escapeHtml(org.country || 'n/a') + '</div></div>';
    html += '<div class="card-row"><div class="card-row-label">Funding</div><div class="card-row-value">' + escapeHtml(org.total_funding_printed || org.latest_funding_stage || 'n/a') + '</div></div>';
    const kw = (org.keywords || []).slice(0, 6);
    if (kw.length) {
      html += '<div class="card-row"><div class="card-row-label">Keywords</div><div class="card-row-value">' + kw.map(k => '<span class="pill">' + escapeHtml(k) + '</span>').join('') + '</div></div>';
    }
  } else {
    if (agentFirmographicSummary) {
      html += '<div style="color:#94a3b8;font-size:12px">No Apollo Org data in this run. Agent fallback filled: ' + escapeHtml(agentFirmographicSummary) + '</div>';
    } else {
      html += '<div style="color:#64748b;font-size:12px">No Apollo Org data (skipped or empty)</div>';
    }
  }
  html += '</div>';

  // Card 2: Apollo People
  html += '<div class="card"><div class="card-title">Apollo People <span class="card-title-tag">decision makers</span></div>';
  const people = s.apollo_top_people || [];
  html += '<div class="card-row"><div class="card-row-label">Count</div><div class="card-row-value">' + people.length + ' results</div></div>';
  html += '<div class="card-row"><div class="card-row-label">Email match</div><div class="card-row-value">' + (s.email_matched_in_top_people ? '<span style="color:#16a34a">matched</span>' : '<span style="color:#94a3b8">no match</span>') + '</div></div>';
  if (s.matched_person && s.matched_person.first_name) {
    html += '<div class="card-row"><div class="card-row-label">Name</div><div class="card-row-value">' + escapeHtml((s.matched_person.first_name || '') + ' ' + (s.matched_person.last_name || '')) + '</div></div>';
    html += '<div class="card-row"><div class="card-row-label">Title</div><div class="card-row-value">' + escapeHtml(s.matched_person.title || 'n/a') + '</div></div>';
  } else if (people.length > 0) {
    html += '<div class="card-row"><div class="card-row-label">Top</div><div class="card-row-value">' + people.slice(0, 3).map(p => escapeHtml((p.first_name || '') + ' ' + (p.last_name || '') + ' (' + (p.title || 'n/a') + ')')).join('<br>') + '</div></div>';
  } else {
    html += '<div style="color:#64748b;font-size:12px;margin-top:8px">No people returned (plan gating or empty)</div>';
  }
  html += '</div>';

  // Card 3: Apify website
  html += '<div class="card"><div class="card-title">Apify Website Crawl <span class="card-title-tag">site evidence</span></div>';
  html += '<div class="card-row"><div class="card-row-label">Pages</div><div class="card-row-value">' + pages.length + ' page(s)</div></div>';
  if (pages.length) {
    html += '<div class="card-row"><div class="card-row-label">Sample URLs</div><div class="card-row-value url-list">';
    html += pages.slice(0, 5).map(p => '<div>' + escapeHtml(p.url || '(no url)') + '</div>').join('');
    html += '</div></div>';
  } else {
    if (tools.length || (findings.source_urls || []).length) {
      html += '<div style="color:#94a3b8;font-size:12px;margin-top:8px">No pages crawled in Apify for this run. The agent fallback supplied external evidence below.</div>';
    } else {
      html += '<div style="color:#64748b;font-size:12px;margin-top:8px">No pages crawled (domain unresolved or skipped)</div>';
    }
  }
  html += '</div>';

  // Card 4: Agent trace
  html += '<div class="card"><div class="card-title">Agent Research Trace <span class="card-title-tag">gap-filling</span></div>';
  html += '<div class="card-row"><div class="card-row-label">Iterations</div><div class="card-row-value">' + (s.agent_iterations || 0) + '</div></div>';
  html += '<div class="card-row"><div class="card-row-label">Has enough info</div><div class="card-row-value">' + (s.agent_has_enough_info ? 'yes' : 'no') + '</div></div>';
  html += '<div class="card-row"><div class="card-row-label">Tools called</div><div class="card-row-value">' + tools.length + '</div></div>';
  if (tools.length) {
    html += '<div style="margin-top:8px">';
    tools.forEach(t => {
      html += '<div class="tool-call">';
      html += '<div class="tool-call-name">' + escapeHtml(t.tool || 'unknown') + '</div>';
      html += '<div class="tool-call-input">input: ' + escapeHtml(t.input || '') + '</div>';
      html += '<div class="tool-call-result">' + escapeHtml(t.result_summary || '') + '</div>';
      html += '</div>';
    });
    html += '</div>';
  }
  if (s.agent_research_reasoning) {
    html += '<div class="reasoning-block"><b>Reasoning:</b> ' + escapeHtml(s.agent_research_reasoning) + '</div>';
  }
  html += '</div>';

  // Card 5: Scoring
  html += '<div class="card"><div class="card-title">ICP Scoring <span class="card-title-tag">7 criteria</span></div>';
  if (criteria.length) {
    criteria.forEach(c => {
      const filled = Math.round((c.score / 2) * 60);
      html += '<div style="padding:6px 0;border-bottom:1px solid #334155">';
      html += '<div style="display:flex;justify-content:space-between;font-size:12px"><b style="color:#cbd5e1">' + escapeHtml(c.name) + '</b><span style="color:#94a3b8">' + c.score + '/2 <span class="score-bar"><span class="score-bar-fill" style="width:' + filled + 'px"></span></span></span></div>';
      html += '<div class="evidence-quote">' + escapeHtml(c.evidence_quote || '') + '</div>';
      html += '</div>';
    });
  } else {
    html += '<div style="color:#64748b;font-size:12px">No criteria scored (fast-path skip)</div>';
  }
  if (criteria.length) {
    html += '<div class="reasoning-block"><b>Subtotal:</b> ' + (s.subtotal || 0) + '/14 across the seven 0-2 ICP criteria. <b>Expected:</b> ' + (s.expected_score === null || s.expected_score === undefined ? 'n/a' : s.expected_score + '/10') + '. <b>Final:</b> ' + (s.final_score === null || s.final_score === undefined ? 'n/a' : s.final_score + '/10') + ', after disqualifiers and holistic judgment.</div>';
  }
  if (dqs.length) {
    html += '<div style="margin-top:10px"><b style="color:#fca5a5;font-size:12px">Disqualifiers:</b><br>';
    dqs.forEach(d => { html += '<span class="dq-badge">' + escapeHtml(d) + '</span>'; });
    html += '</div>';
  }
  html += '</div>';

  // Card 6: Email
  html += '<div class="card"><div class="card-title">Outreach Email <span class="card-title-tag">' + escapeHtml(s.email_template_used || 'n/a') + '</span></div>';
  if (s.email_body) {
    html += '<div class="email-block">';
    html += '<div class="email-subject-line">Subject: ' + escapeHtml(s.email_subject || '(none)') + '</div>';
    html += '<pre class="email-body-pre">' + escapeHtml(s.email_body) + '</pre>';
    html += '</div>';
    if (s.evidence_used && s.evidence_used.length) {
      html += '<div style="margin-top:8px;font-size:11px;color:#94a3b8"><b>Evidence used:</b><br>';
      s.evidence_used.forEach(e => { html += '<span class="pill">' + escapeHtml(e) + '</span>'; });
      html += '</div>';
    }
  } else {
    html += '<div class="skip-block"><b>Justified skip:</b> ' + escapeHtml(s.skip_reason || (dqs[0] || s.action_taken || 'n/a')) + '</div>';
  }
  html += '</div>';

  html += '</div>'; // close grid
  html += '</div>'; // close panel
  return html;
}

function selectTab(idx) {
  document.querySelectorAll('.tab-btn').forEach((b, i) => {
    b.classList.toggle('active', i === idx);
  });
  document.querySelectorAll('.panel').forEach((p, i) => {
    p.classList.toggle('active', i === idx);
  });
  document.querySelectorAll('#summaryBody tr').forEach((r, i) => {
    r.classList.toggle('active-row', i === idx);
  });
}

renderSummary();
renderTabBar();
renderPanels();
selectTab(0);
</script>
</body>
</html>
